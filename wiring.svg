<svg width="900" height="440" viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Consolas, monospace">
  <rect width="900" height="440" fill="#0d0f12"/>

  <text x="450" y="26" text-anchor="middle" fill="#dde3ec" font-size="14" font-weight="bold" font-family="system-ui, sans-serif" letter-spacing="0.05em">DMX REMAPPER — WIRING DIAGRAM</text>

  <!-- LEGEND -->
  <rect x="20" y="400" width="860" height="30" rx="4" fill="#161a1f" stroke="#2a2f38" stroke-width="0.5"/>
  <line x1="32" y1="415" x2="58" y2="415" stroke="#e05c2a" stroke-width="2"/>
  <text x="63" y="419" fill="#9aa" font-size="11">RS-485 differential</text>
  <line x1="200" y1="415" x2="226" y2="415" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="231" y="419" fill="#9aa" font-size="11">UART 3.3V</text>
  <line x1="340" y1="415" x2="366" y2="415" stroke="#e24b4a" stroke-width="1.5"/>
  <text x="371" y="419" fill="#9aa" font-size="11">5V power</text>
  <line x1="452" y1="415" x2="478" y2="415" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="483" y="419" fill="#9aa" font-size="11">LED RX</text>


  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- XLR IN -->
  <rect x="20" y="70" width="80" height="130" rx="6" fill="#1e242c" stroke="#e05c2a" stroke-width="1.2"/>
  <text x="60" y="90" text-anchor="middle" fill="#dde3ec" font-size="10" font-weight="bold" font-family="system-ui">XLR IN</text>
  <text x="60" y="104" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui">console out</text>
  <text x="30" y="128" fill="#e05c2a" font-size="10">3 D+</text>
  <text x="30" y="150" fill="#e05c2a" font-size="10">2 D−</text>
  <text x="30" y="172" fill="#aaa" font-size="10">1 GND</text>
  <circle cx="100" cy="125" r="3" fill="#e05c2a"/>
  <circle cx="100" cy="147" r="3" fill="#e05c2a"/>
  <circle cx="100" cy="169" r="3" fill="#666"/>

  <!-- 120Ω IN -->
  <line x1="100" y1="125" x2="162" y2="125" stroke="#e05c2a" stroke-width="1.8"/>
  <line x1="100" y1="147" x2="162" y2="147" stroke="#e05c2a" stroke-width="1.8"/>
  <line x1="100" y1="169" x2="108" y2="169" stroke="#666" stroke-width="1"/>
  <line x1="108" y1="169" x2="108" y2="330" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- MAX485 RX -->
  <rect x="162" y="44" width="104" height="180" rx="6" fill="#1e242c" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="214" y="62" text-anchor="middle" fill="#dde3ec" font-size="10" font-weight="bold" font-family="system-ui">MAX485 RX</text>
  <text x="214" y="76" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui">input chip</text>
  <text x="168" y="128" fill="#e05c2a" font-size="10">A</text>
  <text x="168" y="150" fill="#e05c2a" font-size="10">B</text>
  <text x="168" y="172" fill="#aaa" font-size="10">GND</text>
  <text x="168" y="100" fill="#e24b4a" font-size="10">VCC</text>
  <text x="260" y="120" fill="#22d3ee" font-size="10">RO→</text>
  <text x="260" y="140" fill="#22d3ee" font-size="10">RE→</text>
  <text x="260" y="160" fill="#22d3ee" font-size="10">DE→</text>
  <line x1="214" y1="44" x2="214" y2="32" stroke="#e24b4a" stroke-width="1.2"/>
  <text x="214" y="26" text-anchor="middle" fill="#e24b4a" font-size="10">5V</text>
  <line x1="162" y1="169" x2="148" y2="169" stroke="#666" stroke-width="1"/>
  <line x1="148" y1="169" x2="148" y2="330" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- UART wires to ESP32 -->
  <line x1="266" y1="117" x2="304" y2="117" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="266" y1="137" x2="284" y2="137" stroke="#22d3ee" stroke-width="1.5"/>
  <line x1="266" y1="157" x2="284" y2="157" stroke="#22d3ee" stroke-width="1.5"/>
  <line x1="284" y1="137" x2="284" y2="157" stroke="#22d3ee" stroke-width="1"/>
  <line x1="284" y1="147" x2="304" y2="147" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ESP32 -->
  <rect x="304" y="28" width="236" height="260" rx="8" fill="#161a1f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="422" y="48" text-anchor="middle" fill="#dde3ec" font-size="11" font-weight="bold" font-family="system-ui">ESP32 DevKit v1</text>
  <text x="312" y="80" fill="#aaa" font-size="9.5">GPIO 16 · RX ←</text>
  <text x="312" y="102" fill="#aaa" font-size="9.5">GPIO 4  · RE/DE ←</text>
  <text x="312" y="134" fill="#2ecc71" font-size="9.5">GPIO 2  · LED RX</text>
  <text x="532" y="80" text-anchor="end" fill="#aaa" font-size="9.5">→ TX · GPIO 17</text>
  <text x="532" y="100" text-anchor="end" fill="#aaa" font-size="9.5">→ DE · GPIO 5</text>
  <text x="422" y="200" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui">WiFi AP · 192.168.4.1 · dmx.local</text>
  <text x="422" y="218" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui">RX: esp_dmx DMX_NUM_1</text>
  <text x="422" y="234" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui">TX: esp_dmx DMX_NUM_0</text>
  <text x="422" y="252" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui">NVS config · Holdover 500ms</text>
  <line x1="422" y1="28" x2="422" y2="16" stroke="#e24b4a" stroke-width="1.2"/>
  <text x="422" y="10" text-anchor="middle" fill="#e24b4a" font-size="10">5V USB</text>
  <line x1="422" y1="288" x2="422" y2="330" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- LED RX -->
  <line x1="304" y1="131" x2="268" y2="131" stroke="#2ecc71" stroke-width="1.5"/>
  <line x1="268" y1="131" x2="268" y2="230" stroke="#2ecc71" stroke-width="1.5"/>
  <rect x="261" y="230" width="14" height="22" rx="3" fill="none" stroke="#2ecc71" stroke-width="1.2"/>
  <text x="248" y="245" text-anchor="end" fill="#2ecc71" font-size="9">100Ω</text>
  <line x1="268" y1="252" x2="268" y2="266" stroke="#2ecc71" stroke-width="1.5"/>
  <polygon points="261,266 275,266 268,278" fill="none" stroke="#2ecc71" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="261" y1="278" x2="275" y2="278" stroke="#2ecc71" stroke-width="1.2"/>
  <line x1="277" y1="268" x2="284" y2="261" stroke="#2ecc71" stroke-width="0.8"/>
  <line x1="278" y1="273" x2="286" y2="268" stroke="#2ecc71" stroke-width="0.8"/>
  <text x="290" y="272" fill="#2ecc71" font-size="9">LED RX</text>
  <text x="290" y="284" fill="#2ecc71" font-size="9">~6 Hz</text>
  <line x1="268" y1="278" x2="268" y2="330" stroke="#2ecc71" stroke-width="1.5"/>

  <!-- UART wires ESP32 → MAX485 TX -->
  <line x1="540" y1="77" x2="596" y2="77" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="540" y1="97" x2="596" y2="97" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MAX485 TX -->
  <rect x="596" y="44" width="104" height="180" rx="6" fill="#1e242c" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="648" y="62" text-anchor="middle" fill="#dde3ec" font-size="10" font-weight="bold" font-family="system-ui">MAX485 TX</text>
  <text x="648" y="76" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui">output chip</text>
  <text x="602" y="80" fill="#22d3ee" font-size="10">DI</text>
  <text x="602" y="100" fill="#22d3ee" font-size="10">DE</text>
  <text x="602" y="172" fill="#aaa" font-size="10">GND</text>
  <text x="694" y="128" fill="#e05c2a" font-size="10">A</text>
  <text x="694" y="150" fill="#e05c2a" font-size="10">B</text>
  <line x1="648" y1="44" x2="648" y2="32" stroke="#e24b4a" stroke-width="1.2"/>
  <text x="648" y="26" text-anchor="middle" fill="#e24b4a" font-size="10">5V</text>
  <line x1="700" y1="169" x2="712" y2="169" stroke="#666" stroke-width="1"/>
  <line x1="712" y1="169" x2="712" y2="330" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="700" cy="125" r="3" fill="#e05c2a"/>
  <circle cx="700" cy="147" r="3" fill="#e05c2a"/>
  <line x1="700" y1="125" x2="762" y2="125" stroke="#e05c2a" stroke-width="1.8"/>
  <line x1="700" y1="147" x2="762" y2="147" stroke="#e05c2a" stroke-width="1.8"/>

  <!-- XLR OUT -->
  <rect x="762" y="70" width="88" height="130" rx="6" fill="#1e242c" stroke="#e05c2a" stroke-width="1.2"/>
  <text x="806" y="90" text-anchor="middle" fill="#dde3ec" font-size="10" font-weight="bold" font-family="system-ui">XLR OUT</text>
  <text x="806" y="104" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui">→ DMX line</text>
  <text x="770" y="128" fill="#e05c2a" font-size="10">3 D+</text>
  <text x="770" y="150" fill="#e05c2a" font-size="10">2 D−</text>
  <text x="770" y="172" fill="#aaa" font-size="10">1 GND</text>
  <circle cx="762" cy="125" r="3" fill="#e05c2a"/>
  <circle cx="762" cy="147" r="3" fill="#e05c2a"/>
  <circle cx="762" cy="169" r="3" fill="#666"/>
  <line x1="762" y1="169" x2="750" y2="169" stroke="#666" stroke-width="1"/>
  <line x1="750" y1="169" x2="750" y2="330" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- GND RAIL -->
  <line x1="108" y1="330" x2="750" y2="330" stroke="#555" stroke-width="1.5"/>
  <line x1="214" y1="330" x2="214" y2="344" stroke="#555" stroke-width="1"/>
  <line x1="206" y1="344" x2="222" y2="344" stroke="#666" stroke-width="1.5"/>
  <line x1="209" y1="349" x2="219" y2="349" stroke="#666" stroke-width="1"/>
  <line x1="212" y1="354" x2="216" y2="354" stroke="#666" stroke-width="0.8"/>
  <line x1="422" y1="330" x2="422" y2="344" stroke="#555" stroke-width="1"/>
  <line x1="414" y1="344" x2="430" y2="344" stroke="#666" stroke-width="1.5"/>
  <line x1="417" y1="349" x2="427" y2="349" stroke="#666" stroke-width="1"/>
  <line x1="420" y1="354" x2="424" y2="354" stroke="#666" stroke-width="0.8"/>
  <line x1="648" y1="330" x2="648" y2="344" stroke="#555" stroke-width="1"/>
  <line x1="640" y1="344" x2="656" y2="344" stroke="#666" stroke-width="1.5"/>
  <line x1="643" y1="349" x2="653" y2="349" stroke="#666" stroke-width="1"/>
  <line x1="646" y1="354" x2="650" y2="354" stroke="#666" stroke-width="0.8"/>
  <text x="430" y="372" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui">Common GND — connect all grounds: ESP32, MAX485 RX, MAX485 TX, XLR shields</text>

  <!-- Note -->
  <text x="806" y="228" text-anchor="middle" fill="#5a6070" font-size="8.5" font-family="system-ui">120Ω on output is</text>
  <text x="806" y="240" text-anchor="middle" fill="#5a6070" font-size="8.5" font-family="system-ui">optional. Place it</text>
  <text x="806" y="252" text-anchor="middle" fill="#5a6070" font-size="8.5" font-family="system-ui">at last fixture.</text>
</svg>