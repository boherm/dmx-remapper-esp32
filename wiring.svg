<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Consolas, monospace">
  <rect width="900" height="480" fill="#0d0f12"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#dde3ec" font-size="14" font-weight="bold" font-family="system-ui, sans-serif" letter-spacing="0.05em">DMX REMAPPER — WIRING DIAGRAM</text>

  <!-- ══ LEGEND ══ -->
  <rect x="20" y="440" width="860" height="30" rx="4" fill="#161a1f" stroke="#2a2f38" stroke-width="0.5"/>
  <line x1="32" y1="455" x2="58" y2="455" stroke="#e05c2a" stroke-width="2"/>
  <text x="63" y="459" fill="#9aa" font-size="11">RS-485 differential</text>
  <line x1="180" y1="455" x2="206" y2="455" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="211" y="459" fill="#9aa" font-size="11">UART 3.3V</text>
  <line x1="310" y1="455" x2="336" y2="455" stroke="#e24b4a" stroke-width="1.5"/>
  <text x="341" y="459" fill="#9aa" font-size="11">5V power</text>
  <line x1="420" y1="455" x2="446" y2="455" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="451" y="459" fill="#9aa" font-size="11">LED RX activity</text>
  <line x1="570" y1="455" x2="596" y2="455" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="601" y="459" fill="#9aa" font-size="11">LED TX activity</text>
  <rect x="720" y="449" width="16" height="10" rx="2" fill="none" stroke="#e05c2a" stroke-width="1"/>
  <text x="740" y="459" fill="#9aa" font-size="11">120Ω termination</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arr-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- ══ XLR IN ══ -->
  <rect x="20" y="90" width="80" height="130" rx="6" fill="#1e242c" stroke="#e05c2a" stroke-width="1.2"/>
  <text x="60" y="110" text-anchor="middle" fill="#dde3ec" font-size="10" font-weight="bold" font-family="system-ui,sans-serif">XLR IN</text>
  <text x="60" y="124" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui,sans-serif">console out</text>
  <text x="30" y="148" fill="#e05c2a" font-size="10">2 D+</text>
  <text x="30" y="170" fill="#e05c2a" font-size="10">3 D−</text>
  <text x="30" y="192" fill="#aaa" font-size="10">1 GND</text>
  <!-- XLR IN pins -->
  <circle cx="100" cy="145" r="3" fill="#e05c2a"/>
  <circle cx="100" cy="167" r="3" fill="#e05c2a"/>
  <circle cx="100" cy="189" r="3" fill="#666"/>

  <!-- 120Ω IN -->
  <line x1="100" y1="145" x2="120" y2="145" stroke="#e05c2a" stroke-width="1.8"/>
  <rect x="120" y="139" width="22" height="12" rx="3" fill="none" stroke="#e05c2a" stroke-width="1.2"/>
  <line x1="142" y1="145" x2="162" y2="145" stroke="#e05c2a" stroke-width="1.8"/>
  <line x1="100" y1="167" x2="120" y2="167" stroke="#e05c2a" stroke-width="1.8"/>
  <rect x="120" y="161" width="22" height="12" rx="3" fill="none" stroke="#e05c2a" stroke-width="1.2"/>
  <line x1="142" y1="167" x2="162" y2="167" stroke="#e05c2a" stroke-width="1.8"/>
  <text x="131" y="190" text-anchor="middle" fill="#e05c2a" font-size="9">120Ω</text>

  <!-- GND XLR IN to rail -->
  <line x1="100" y1="189" x2="108" y2="189" stroke="#666" stroke-width="1"/>
  <line x1="108" y1="189" x2="108" y2="360" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ MAX485 RX ══ -->
  <rect x="162" y="60" width="104" height="190" rx="6" fill="#1e242c" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="214" y="80" text-anchor="middle" fill="#dde3ec" font-size="10" font-weight="bold" font-family="system-ui,sans-serif">MAX485</text>
  <text x="214" y="94" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui,sans-serif">RX chip</text>
  <!-- Left pins -->
  <text x="168" y="148" fill="#e05c2a" font-size="10">A</text>
  <text x="168" y="170" fill="#e05c2a" font-size="10">B</text>
  <text x="168" y="192" fill="#aaa" font-size="10">GND</text>
  <text x="168" y="120" fill="#e24b4a" font-size="10">VCC</text>
  <!-- Right pins labels -->
  <text x="260" y="140" fill="#22d3ee" font-size="10">RO→</text>
  <text x="260" y="160" fill="#22d3ee" font-size="10">RE→</text>
  <text x="260" y="180" fill="#22d3ee" font-size="10">DE→</text>
  <!-- VCC line up -->
  <line x1="214" y1="60" x2="214" y2="48" stroke="#e24b4a" stroke-width="1.2"/>
  <text x="214" y="43" text-anchor="middle" fill="#e24b4a" font-size="10">5V</text>
  <!-- GND dashed -->
  <line x1="162" y1="189" x2="148" y2="189" stroke="#666" stroke-width="1"/>
  <line x1="148" y1="189" x2="148" y2="360" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- UART wires RX chip → ESP32 -->
  <line x1="266" y1="137" x2="304" y2="137" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- RE+DE joined -->
  <line x1="266" y1="157" x2="284" y2="157" stroke="#22d3ee" stroke-width="1.5"/>
  <line x1="266" y1="177" x2="284" y2="177" stroke="#22d3ee" stroke-width="1.5"/>
  <line x1="284" y1="157" x2="284" y2="177" stroke="#22d3ee" stroke-width="1"/>
  <line x1="284" y1="167" x2="304" y2="167" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ ESP32 ══ -->
  <rect x="304" y="44" width="236" height="280" rx="8" fill="#161a1f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="422" y="66" text-anchor="middle" fill="#dde3ec" font-size="11" font-weight="bold" font-family="system-ui,sans-serif">ESP32 DevKit v1</text>

  <!-- Left pin labels -->
  <text x="312" y="100" fill="#aaa" font-size="9.5">GPIO 16 · RX ←</text>
  <text x="312" y="122" fill="#aaa" font-size="9.5">GPIO 4  · RE/DE ←</text>
  <text x="312" y="155" fill="#2ecc71" font-size="9.5">GPIO 2  · LED RX</text>
  <!-- Right pin labels -->
  <text x="532" y="100" text-anchor="end" fill="#aaa" font-size="9.5">→ TX · GPIO 17</text>
  <text x="532" y="120" text-anchor="end" fill="#aaa" font-size="9.5">→ DE · GPIO 5</text>
  <text x="532" y="150" text-anchor="end" fill="#a78bfa" font-size="9.5">LED TX · GPIO 15</text>

  <!-- USB power label -->
  <line x1="422" y1="44" x2="422" y2="32" stroke="#e24b4a" stroke-width="1.2"/>
  <text x="422" y="26" text-anchor="middle" fill="#e24b4a" font-size="10">5V USB</text>

  <!-- Internal notes -->
  <text x="422" y="220" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui,sans-serif">WiFi AP · 192.168.4.1</text>
  <text x="422" y="238" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui,sans-serif">http://dmx.local</text>
  <text x="422" y="258" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui,sans-serif">NVS config · Holdover 500ms</text>

  <!-- GND ESP32 to rail -->
  <line x1="422" y1="324" x2="422" y2="360" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ LED RX ══ -->
  <line x1="304" y1="152" x2="268" y2="152" stroke="#2ecc71" stroke-width="1.5"/>
  <line x1="268" y1="152" x2="268" y2="260" stroke="#2ecc71" stroke-width="1.5"/>
  <!-- resistor -->
  <rect x="261" y="260" width="14" height="22" rx="3" fill="none" stroke="#2ecc71" stroke-width="1.2"/>
  <text x="248" y="275" text-anchor="end" fill="#2ecc71" font-size="9">100Ω</text>
  <line x1="268" y1="282" x2="268" y2="296" stroke="#2ecc71" stroke-width="1.5"/>
  <!-- LED symbol -->
  <polygon points="261,296 275,296 268,308" fill="none" stroke="#2ecc71" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="261" y1="308" x2="275" y2="308" stroke="#2ecc71" stroke-width="1.2"/>
  <!-- rays -->
  <line x1="277" y1="298" x2="284" y2="291" stroke="#2ecc71" stroke-width="0.8"/>
  <line x1="278" y1="303" x2="286" y2="298" stroke="#2ecc71" stroke-width="0.8"/>
  <text x="290" y="302" fill="#2ecc71" font-size="9">LED RX</text>
  <text x="290" y="314" fill="#2ecc71" font-size="9">~3 Hz</text>
  <line x1="268" y1="308" x2="268" y2="360" stroke="#2ecc71" stroke-width="1.5"/>

  <!-- ══ LED TX ══ -->
  <line x1="540" y1="147" x2="574" y2="147" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="574" y1="147" x2="574" y2="260" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- resistor -->
  <rect x="567" y="260" width="14" height="22" rx="3" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="595" y="275" fill="#a78bfa" font-size="9">100Ω</text>
  <line x1="574" y1="282" x2="574" y2="296" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- LED symbol -->
  <polygon points="567,296 581,296 574,308" fill="none" stroke="#a78bfa" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="567" y1="308" x2="581" y2="308" stroke="#a78bfa" stroke-width="1.2"/>
  <!-- rays -->
  <line x1="583" y1="298" x2="590" y2="291" stroke="#a78bfa" stroke-width="0.8"/>
  <line x1="584" y1="303" x2="592" y2="298" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="596" y="302" fill="#a78bfa" font-size="9">LED TX</text>
  <text x="596" y="314" fill="#a78bfa" font-size="9">30ms/frame</text>
  <line x1="574" y1="308" x2="574" y2="360" stroke="#a78bfa" stroke-width="1.5"/>

  <!-- UART wires ESP32 → MAX485 TX -->
  <line x1="540" y1="97" x2="596" y2="97" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="540" y1="117" x2="596" y2="117" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ MAX485 TX ══ -->
  <rect x="596" y="60" width="104" height="190" rx="6" fill="#1e242c" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="648" y="80" text-anchor="middle" fill="#dde3ec" font-size="10" font-weight="bold" font-family="system-ui,sans-serif">MAX485</text>
  <text x="648" y="94" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui,sans-serif">TX chip</text>
  <!-- Left pins -->
  <text x="602" y="100" fill="#22d3ee" font-size="10">DI</text>
  <text x="602" y="120" fill="#22d3ee" font-size="10">DE</text>
  <text x="602" y="192" fill="#aaa" font-size="10">GND</text>
  <!-- Right pins -->
  <text x="694" y="148" fill="#e05c2a" font-size="10">A</text>
  <text x="694" y="170" fill="#e05c2a" font-size="10">B</text>
  <!-- VCC -->
  <line x1="648" y1="60" x2="648" y2="48" stroke="#e24b4a" stroke-width="1.2"/>
  <text x="648" y="43" text-anchor="middle" fill="#e24b4a" font-size="10">5V</text>
  <!-- GND dashed -->
  <line x1="700" y1="189" x2="712" y2="189" stroke="#666" stroke-width="1"/>
  <line x1="712" y1="189" x2="712" y2="360" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Output lines -->
  <circle cx="700" cy="145" r="3" fill="#e05c2a"/>
  <circle cx="700" cy="167" r="3" fill="#e05c2a"/>
  <!-- 120Ω OUT -->
  <line x1="700" y1="145" x2="720" y2="145" stroke="#e05c2a" stroke-width="1.8"/>
  <rect x="720" y="139" width="22" height="12" rx="3" fill="none" stroke="#e05c2a" stroke-width="1.2"/>
  <line x1="742" y1="145" x2="762" y2="145" stroke="#e05c2a" stroke-width="1.8"/>
  <line x1="700" y1="167" x2="720" y2="167" stroke="#e05c2a" stroke-width="1.8"/>
  <rect x="720" y="161" width="22" height="12" rx="3" fill="none" stroke="#e05c2a" stroke-width="1.2"/>
  <line x1="742" y1="167" x2="762" y2="167" stroke="#e05c2a" stroke-width="1.8"/>
  <text x="731" y="190" text-anchor="middle" fill="#e05c2a" font-size="9">120Ω</text>
  <text x="731" y="202" text-anchor="middle" fill="#5a6070" font-size="8">(optional)</text>

  <!-- ══ XLR OUT ══ -->
  <rect x="762" y="90" width="88" height="130" rx="6" fill="#1e242c" stroke="#e05c2a" stroke-width="1.2"/>
  <text x="806" y="110" text-anchor="middle" fill="#dde3ec" font-size="10" font-weight="bold" font-family="system-ui,sans-serif">XLR OUT</text>
  <text x="806" y="124" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui,sans-serif">→ DMX line</text>
  <text x="770" y="148" fill="#e05c2a" font-size="10">2 D+</text>
  <text x="770" y="170" fill="#e05c2a" font-size="10">3 D−</text>
  <text x="770" y="192" fill="#aaa" font-size="10">1 GND</text>
  <circle cx="762" cy="145" r="3" fill="#e05c2a"/>
  <circle cx="762" cy="167" r="3" fill="#e05c2a"/>
  <circle cx="762" cy="189" r="3" fill="#666"/>
  <!-- GND XLR OUT to rail -->
  <line x1="762" y1="189" x2="750" y2="189" stroke="#666" stroke-width="1"/>
  <line x1="750" y1="189" x2="750" y2="360" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ GND RAIL ══ -->
  <line x1="108" y1="360" x2="750" y2="360" stroke="#555" stroke-width="1.5"/>
  <!-- GND symbols -->
  <line x1="214" y1="360" x2="214" y2="374" stroke="#555" stroke-width="1"/>
  <line x1="206" y1="374" x2="222" y2="374" stroke="#666" stroke-width="1.5"/>
  <line x1="209" y1="379" x2="219" y2="379" stroke="#666" stroke-width="1"/>
  <line x1="212" y1="384" x2="216" y2="384" stroke="#666" stroke-width="0.8"/>

  <line x1="422" y1="360" x2="422" y2="374" stroke="#555" stroke-width="1"/>
  <line x1="414" y1="374" x2="430" y2="374" stroke="#666" stroke-width="1.5"/>
  <line x1="417" y1="379" x2="427" y2="379" stroke="#666" stroke-width="1"/>
  <line x1="420" y1="384" x2="424" y2="384" stroke="#666" stroke-width="0.8"/>

  <line x1="648" y1="360" x2="648" y2="374" stroke="#555" stroke-width="1"/>
  <line x1="640" y1="374" x2="656" y2="374" stroke="#666" stroke-width="1.5"/>
  <line x1="643" y1="379" x2="653" y2="379" stroke="#666" stroke-width="1"/>
  <line x1="646" y1="384" x2="650" y2="384" stroke="#666" stroke-width="0.8"/>

  <text x="430" y="400" text-anchor="middle" fill="#5a6070" font-size="9" font-family="system-ui,sans-serif">Common GND — connect all grounds: ESP32, MAX485 RX, MAX485 TX, XLR shields</text>

  <!-- Note on 120Ω optional -->
  <text x="806" y="240" text-anchor="middle" fill="#5a6070" font-size="8.5" font-family="system-ui,sans-serif">120Ω on output is</text>
  <text x="806" y="252" text-anchor="middle" fill="#5a6070" font-size="8.5" font-family="system-ui,sans-serif">optional (emitter side)</text>
  <text x="806" y="264" text-anchor="middle" fill="#5a6070" font-size="8.5" font-family="system-ui,sans-serif">Place 120Ω at the</text>
  <text x="806" y="276" text-anchor="middle" fill="#5a6070" font-size="8.5" font-family="system-ui,sans-serif">end of the DMX line</text>
</svg>